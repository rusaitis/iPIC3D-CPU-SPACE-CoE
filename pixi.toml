[project]
name = "ipic3d"
version = "0.1.0"
description = "iPIC3D — implicit particle-in-cell code for 3D plasma simulations"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

# ── C++ build toolchain ─────────────────────────────────────────────
[feature.build.dependencies]
cmake       = ">=3.13"
make        = "*"
pkg-config  = "*"
compilers   = "*"                                              # cc, c++, gfortran
openmpi     = ">=5"
hdf5        = { version = ">=1.14", build = "mpi_openmpi*" }  # parallel HDF5
llvm-openmp = ">=18"

# ── PETSc (optional) ────────────────────────────────────────────────
[feature.petsc.dependencies]
petsc = { version = ">=3.21", build = "real*" }                # real arithmetic, openmpi

# ── Python core ─────────────────────────────────────────────────────
[feature.py.dependencies]
python     = ">=3.12"
numpy      = "*"
matplotlib = "*"
h5py       = "*"
mpi4py     = "*"

# ── Python extras (heavy, only for VTK export / proc2vtr scripts) ──
[feature.py-extra.dependencies]
scipy    = "*"
pytables = "*"
pyevtk   = "*"

# ── Environments ────────────────────────────────────────────────────
[environments]
default    = { features = ["build", "py"],          solve-group = "default" }
petsc      = { features = ["build", "petsc", "py"], solve-group = "default" }
build-only = { features = ["build"] }
py         = { features = ["py"], no-default-feature = true }

# ── Tasks ───────────────────────────────────────────────────────────
[tasks]
configure = { cmd = [
  "cmake", "-S", ".", "-B", "build",
  "-DCMAKE_BUILD_TYPE=Release",
  "-DCMAKE_C_COMPILER=mpicc",
  "-DCMAKE_CXX_COMPILER=mpicxx",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
] }
build = { cmd = ["cmake", "--build", "build", "--parallel"], depends-on = ["configure"] }
clean = "rm -rf build"

test-smoke = { cmd = [
  "mpirun", "--oversubscribe", "-np", "4",
  "build/iPIC3D", "inputfiles/testGEM2Dsmall.inp",
], depends-on = ["build"] }

[feature.petsc.tasks]
# Override configure to enable PETSc when in the petsc environment
configure = { cmd = [
  "cmake", "-S", ".", "-B", "build",
  "-DCMAKE_BUILD_TYPE=Release",
  "-DCMAKE_C_COMPILER=mpicc",
  "-DCMAKE_CXX_COMPILER=mpicxx",
  "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
  "-DUSE_PETSC=ON",
] }

test-petsc = { cmd = [
  "bash", "tests/test_petsc.sh", "--np", "4", "--cycles", "5",
], depends-on = ["build"] }
