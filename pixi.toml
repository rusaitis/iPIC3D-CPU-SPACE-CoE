[workspace]
name = "ipic3d"
version = "0.1.0"
description = "iPIC3D — implicit particle-in-cell code for 3D plasma simulations"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

# ── C++ build toolchain ─────────────────────────────────────────────
[feature.build.dependencies]
cmake       = ">=3.13"
make        = "*"
pkg-config  = "*"
compilers   = "*"                                              # cc, c++, gfortran
openmpi     = ">=5"
hdf5        = { version = ">=1.14", build = "mpi_openmpi*" }  # parallel HDF5
llvm-openmp = ">=18"

# ── PETSc (optional) ────────────────────────────────────────────────
[feature.petsc.dependencies]
petsc = { version = ">=3.21", build = "real*" }                # real arithmetic, openmpi

# When the petsc environment is active, inject the PETSc CMake flag
# into the shared configure task via this env var (referenced in $IPIC3D_CMAKE_EXTRA).
[feature.petsc.activation.env]
IPIC3D_CMAKE_EXTRA = "-DUSE_PETSC=ON"

# ── Python core ─────────────────────────────────────────────────────
[feature.py.dependencies]
python     = ">=3.12"
numpy      = "*"
matplotlib = "*"
h5py       = "*"
mpi4py     = "*"

# ── Environments ────────────────────────────────────────────────────
[environments]
default    = { features = ["build", "py"],          solve-group = "default" }
petsc      = { features = ["build", "petsc", "py"], solve-group = "default" }
build-only = { features = ["build"] }
py         = { features = ["py"], no-default-feature = true }

# ── Tasks ───────────────────────────────────────────────────────────
[tasks]
configure = { cmd = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DHDF5_ROOT=$CONDA_PREFIX $IPIC3D_CMAKE_EXTRA" }
build = { cmd = ["cmake", "--build", "build", "--parallel"], depends-on = ["configure"] }
clean = "rm -rf build"

test-smoke = { cmd = [
  "mpirun", "--oversubscribe", "-np", "4",
  "build/iPIC3D", "inputfiles/testGEM2Dsmall.inp",
], depends-on = ["build"] }

[feature.petsc.tasks]
build = { cmd = ["cmake", "--build", "build", "--parallel"], depends-on = [
  { task = "configure", environment = "petsc" },
] }
build-petsc = { depends-on = [
  { task = "build", environment = "petsc" },
] }
test-petsc = { cmd = "bash tests/test_petsc.sh", depends-on = [
  { task = "build", environment = "petsc" },
] }
