name: CI Build

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build-default:
    name: Default build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopenmpi-dev libhdf5-openmpi-dev pkg-config

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_CXX_COMPILER=mpicxx

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test (3 cycles)
        run: |
          mkdir -p /tmp/ipic3d_ci
          mpirun --oversubscribe -np 4 build/iPIC3D inputfiles/ci_smoke.inp

  build-petsc:
    name: PETSc build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopenmpi-dev libhdf5-openmpi-dev pkg-config petsc-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_CXX_COMPILER=mpicxx \
            -DUSE_PETSC=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test — GMRES (3 cycles)
        run: |
          mkdir -p /tmp/ipic3d_ci
          mpirun --oversubscribe -np 4 build/iPIC3D inputfiles/ci_smoke.inp -solver GMRES

      - name: Smoke test — PETSc (3 cycles)
        run: |
          mkdir -p /tmp/ipic3d_ci
          mpirun --oversubscribe -np 4 build/iPIC3D inputfiles/ci_smoke.inp -solver PETSc
